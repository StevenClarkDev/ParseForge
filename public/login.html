<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ParseForge</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260605logo3">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body data-default-next="/dashboard.html">
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-content">
                <a href="index.html" class="logo" style="color: white; margin-bottom: 2rem; display: inline-flex;">
                    <span class="logo-icon"><img src="assets/images/parse-forge-logo.png?v=20260605logo3" alt="Parse Forge logo"></span>
                </a>
                <h1>Build the Future</h1>
                <p>Join thousands of developers building production integrations with ParseForge APIs and tools.</p>

                <div class="auth-stats-inline">
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">10K+</div>
                        <div>Developers</div>
                    </div>
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">1M+</div>
                        <div>API Calls/day</div>
                    </div>
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">99.9%</div>
                        <div>Uptime</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-form compact">
                <div class="auth-header wide">
                    <h2>Welcome Back</h2>
                    <p>Sign in to your account to continue</p>
                </div>

                <div id="authMessage" class="auth-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" placeholder="developer@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-submit" id="loginSubmit">Sign In</button>
                </form>

                <div class="auth-divider">or</div>

                <div class="social-login">
                    <button class="social-btn" type="button">GitHub login coming soon</button>
                    <button class="social-btn" type="button">Google login coming soon</button>
                </div>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Create one now</a><br>
                    Admin access? <a href="admin-login.html">Use admin login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/auth-login.js"></script>
</body>
</html>
