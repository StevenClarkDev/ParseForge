<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - ParseForge</title>
    <link rel="stylesheet" href="assets/css/style.css?v=20260605logo3">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-left hide-mobile">
            <div class="auth-left-content">
                <a href="index.html" class="logo" style="color: white; margin-bottom: 2rem; display: inline-flex;">
                    <span class="logo-icon"><img src="assets/images/parse-forge-logo.png?v=20260605logo3" alt="Parse Forge logo"></span>
                </a>
                <p>Join developers building real products on top of ParseForge.</p>
                <div class="stats">
                    <div class="stat-item">
                        <h3>50K+</h3>
                        <p>Developers</p>
                    </div>
                    <div class="stat-item">
                        <h3>99.9%</h3>
                        <p>Uptime</p>
                    </div>
                    <div class="stat-item">
                        <h3>1M+</h3>
                        <p>API Calls/Day</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-right scrollable">
            <div class="auth-form">
                <div class="auth-header">
                    <h2>Create your account</h2>
                    <p>Already have an account? <a href="login.html">Sign in</a></p>
                </div>

                <div id="authMessage" class="auth-message"></div>

                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="firstName">First Name</label>
                            <input type="text" id="firstName" name="firstName" required placeholder="John">
                        </div>
                        <div class="form-group">
                            <label for="lastName">Last Name</label>
                            <input type="text" id="lastName" name="lastName" required placeholder="Doe">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="company">Company Name (Optional)</label>
                        <input type="text" id="company" name="company" placeholder="Acme Inc.">
                    </div>

                    <div class="form-group">
                        <label for="useCase">What will you build?</label>
                        <select id="useCase" name="useCase" required>
                            <option value="">Select use case</option>
                            <option value="web">Web Application</option>
                            <option value="mobile">Mobile App</option>
                            <option value="saas">SaaS Product</option>
                            <option value="ecommerce">E-commerce</option>
                            <option value="automation">Automation/Integration</option>
                            <option value="other">Other</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="At least 8 characters">
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Re-enter password">
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="terms" name="terms" required>
                        <label for="terms">
                            I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
                        </label>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">
                            Send me product updates and developer tips
                        </label>
                    </div>

                    <button type="submit" class="btn-submit" id="registerSubmit">Create Account</button>
                </form>

                <div class="auth-divider">or</div>

                <div class="social-login">
                    <button class="social-btn" type="button">GitHub signup coming soon</button>
                    <button class="social-btn" type="button">Google signup coming soon</button>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/auth-register.js"></script>
</body>
</html>
