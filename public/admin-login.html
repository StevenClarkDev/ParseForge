<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - ParseForge</title>
    <script src="assets/js/theme.js?v=20260611fix1"></script>
    <link rel="stylesheet" href="assets/css/style.css?v=20260605logo3">
    <link rel="stylesheet" href="assets/css/auth.css">
</head>
<body data-default-next="/admin.html">
    <button class="theme-toggle theme-toggle-floating" type="button" data-theme-toggle aria-label="Switch theme"><span data-theme-toggle-icon>D</span></button>
    <div class="auth-container">
        <div class="auth-left">
            <div class="auth-left-content">
                <a href="index.html" class="logo" style="color: white; margin-bottom: 2rem; display: inline-flex;">
                    <span class="logo-icon"><img src="assets/images/parse-forge-logo.png?v=20260605logo3" alt="Parse Forge logo"></span>
                </a>
                <h1>Admin Console Access</h1>
                <p>Use this entry point for ParseForge staff and administrators managing products, billing, and users.</p>

                <div class="auth-stats-inline">
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">1</div>
                        <div>Admin Portal</div>
                    </div>
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">24/7</div>
                        <div>Operations</div>
                    </div>
                    <div>
                        <div style="font-size: 2rem; font-weight: 700;">Secure</div>
                        <div>Restricted Access</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-right">
            <div class="auth-form compact">
                <div class="auth-header wide">
                    <h2>Admin Sign In</h2>
                    <p>Enter your administrator credentials to continue</p>
                </div>

                <div id="authMessage" class="auth-message"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Admin Email</label>
                        <input type="email" id="email" placeholder="admin@parse-forge.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn-submit" id="loginSubmit">Access Admin Panel</button>
                </form>

                <div class="auth-divider">or</div>

                <div class="social-login">
                    <button class="social-btn" type="button">SSO login coming soon</button>
                    <button class="social-btn" type="button">Security key login coming soon</button>
                </div>

                <div class="auth-footer">
                    Need the client portal instead? <a href="login.html">Go to user login</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/auth-login.js"></script>
</body>
</html>
